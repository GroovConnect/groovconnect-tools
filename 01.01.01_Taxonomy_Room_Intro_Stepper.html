<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Layer Taxonomy — Room Intro Sequence</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: #f5f5f7;
  color: #1D1D1F;
  padding: 40px 24px;
  max-width: 620px;
  margin: 0 auto;
  min-height: 100vh;
}
@media (prefers-color-scheme: dark) {
  body { background: #111; color: #e8e8e8; }
}
.meta {
  font-size: 12px;
  color: #8E8E93;
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
h1 {
  font-size: 20px;
  font-weight: 500;
  color: #1D1D1F;
  margin-bottom: 28px;
}
@media (prefers-color-scheme: dark) { h1 { color: #e8e8e8; } }
.pips {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
}
.pip {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #D1D1D6;
  transition: background 0.2s, transform 0.2s;
  flex-shrink: 0;
}
@media (prefers-color-scheme: dark) { .pip { background: #3a3a3a; } }
.pip.on {
  background: #185FA5;
  transform: scale(1.3);
}
.card {
  background: #fff;
  border: 0.5px solid #D1D1D6;
  border-radius: 14px;
  padding: 24px 26px;
  min-height: 210px;
  transition: opacity 0.15s;
}
@media (prefers-color-scheme: dark) {
  .card { background: #1e1e1e; border-color: #333; }
}
.beat {
  font-size: 11px;
  font-weight: 600;
  color: #8E8E93;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.question {
  font-size: 18px;
  font-weight: 500;
  color: #1D1D1F;
  line-height: 1.5;
  margin-bottom: 14px;
}
@media (prefers-color-scheme: dark) { .question { color: #e8e8e8; } }
.note {
  font-size: 13px;
  color: #6E6E73;
  line-height: 1.65;
  border-left: 2px solid #D1D1D6;
  padding-left: 14px;
  margin-top: 4px;
}
@media (prefers-color-scheme: dark) {
  .note { color: #9a9a9a; border-left-color: #3a3a3a; }
}
.action-badge {
  display: inline-block;
  margin-top: 16px;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 99px;
  background: #E6F1FB;
  color: #185FA5;
  letter-spacing: 0.2px;
}
@media (prefers-color-scheme: dark) {
  .action-badge { background: #0C447C; color: #B5D4F4; }
}
.controls {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
button {
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  padding: 9px 22px;
  border-radius: 9px;
  border: 0.5px solid #AEAEB2;
  background: #fff;
  color: #1D1D1F;
  cursor: pointer;
  transition: background 0.12s, opacity 0.12s;
}
@media (prefers-color-scheme: dark) {
  button { background: #1e1e1e; border-color: #444; color: #e8e8e8; }
  button:hover { background: #2a2a2a; }
}
button:hover { background: #f2f2f7; }
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.35; cursor: default; }
button.primary {
  background: #1D1D1F;
  color: #fff;
  border-color: #1D1D1F;
}
@media (prefers-color-scheme: dark) {
  button.primary { background: #e8e8e8; color: #111; border-color: #e8e8e8; }
}
button.primary:hover { background: #3a3a3c; }
.footer {
  margin-top: 32px;
  font-size: 12px;
  color: #8E8E93;
  border-top: 0.5px solid #D1D1D6;
  padding-top: 12px;
}
@media (prefers-color-scheme: dark) {
  .footer { border-top-color: #2a2a2a; }
}
</style>
</head>
<body>

<div class="meta">GroovConnect OAS™ · Module 01 · Instructor Tool</div>
<h1>Room intro — Three-Layer Taxonomy</h1>

<div class="pips" id="pips"></div>
<div class="card" id="card"></div>
<div class="controls">
  <button id="prev-btn" onclick="go(-1)">Back</button>
  <button id="next-btn" class="primary" onclick="go(1)">Next</button>
</div>

<div class="footer">Use this to pace the room introduction before presenting the taxonomy. Move through each beat only when the previous one has landed.</div>

<script>
const STEPS = [
  {
    beat: "Beat 1 — open with a question",
    question: "\u201cThink of the last time something went wrong at work \u2014 a process that broke, a number that missed target, a customer who left. Who did you blame first?\u201d",
    note: "Let 3\u20134 people answer. Write the names or types on the board. Do not comment. Do not correct. Do not redirect. Just collect what the room gives you.",
    action: "Write responses on the board"
  },
  {
    beat: "Beat 2 \u2014 the reframe question",
    question: "\u201cWhat if that person was doing exactly what the system allowed them to do?\u201d",
    note: "Then pause. Say nothing. Let the room sit with it for 5\u201310 seconds. The silence is the teaching moment \u2014 the cognitive dissonance has to form before the taxonomy can land. Do not rescue the room from the discomfort.",
    action: "Pause \u2014 let it land"
  },
  {
    beat: "Beat 3 \u2014 introduce the taxonomy",
    question: "Only now does the Three-Layer Taxonomy arrive \u2014 as the answer to a question the room has already felt.",
    note: "The taxonomy is most powerful when it arrives as a solution to a problem the trainee has already named \u2014 not as an abstract framework delivered before the problem is felt. Everything they wrote on the board is about to be reclassified.",
    action: "Introduce the Three-Layer Taxonomy"
  }
];

let cur = 0;

function render() {
  const s = STEPS[cur];

  document.getElementById('pips').innerHTML =
    STEPS.map((_, i) =>
      `<div class="pip${i === cur ? ' on' : ''}"></div>`
    ).join('') +
    `<span style="font-size:12px;color:#8E8E93;margin-left:4px">${cur + 1} of ${STEPS.length}</span>`;

  document.getElementById('card').innerHTML =
    `<div class="beat">${s.beat}</div>` +
    `<div class="question">${s.question}</div>` +
    `<div class="note">${s.note}</div>` +
    `<span class="action-badge">${s.action}</span>`;

  document.getElementById('prev-btn').disabled = cur === 0;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = cur === STEPS.length - 1 ? 'Done \u2713' : 'Next';
  nextBtn.disabled = cur === STEPS.length - 1;
}

function go(dir) {
  cur = Math.max(0, Math.min(STEPS.length - 1, cur + dir));
  render();
}

render();
</script>
</body>
</html>
