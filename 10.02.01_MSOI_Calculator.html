<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 10 — MSOI Calculator & Maturity Tiers</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f5f5f7; color: #1D1D1F; padding: 32px 24px; max-width: 660px; margin: 0 auto; min-height: 100vh; }
@media (prefers-color-scheme: dark) { body { background: #111; color: #e8e8e8; } }
.meta { font-size: 12px; color: #8E8E93; margin-bottom: 4px; }
h1 { font-size: 19px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #6E6E73; margin-bottom: 20px; }
.view-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab { font-family: inherit; font-size: 13px; font-weight: 500; padding: 7px 18px; border-radius: 8px; border: 0.5px solid #D1D1D6; background: #fff; color: #6E6E73; cursor: pointer; }
@media (prefers-color-scheme: dark) { .tab { background: #1e1e1e; border-color: #333; color: #9a9a9a; } }
.tab.act-calc { background: #E6F1FB; border-color: #185FA5; color: #185FA5; font-weight: 600; }
.tab.act-tiers { background: #E1F5EE; border-color: #0F6E56; color: #0F6E56; font-weight: 600; }
.panel { display: none; }
.panel.active { display: block; }
/* Calculator */
.formula-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.fs-item { background: #E6F1FB; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #0C447C; font-family: "SFMono-Regular", Menlo, monospace; white-space: nowrap; }
@media (prefers-color-scheme: dark) { .fs-item { background: #0a1f3a; color: #85B7EB; } }
.comp-card { background: #fff; border: 0.5px solid #D1D1D6; border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; }
@media (prefers-color-scheme: dark) { .comp-card { background: #1e1e1e; border-color: #333; } }
.comp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.comp-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
.comp-name { font-size: 13px; font-weight: 600; color: #1D1D1F; flex: 1; }
@media (prefers-color-scheme: dark) { .comp-name { color: #e8e8e8; } }
.comp-score { font-size: 20px; font-weight: 500; font-variant-numeric: tabular-nums; }
.comp-formula { font-size: 11px; color: #6E6E73; margin-bottom: 8px; font-family: "SFMono-Regular", Menlo, monospace; }
.input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.input-row label { font-size: 12px; color: #1D1D1F; min-width: 200px; }
@media (prefers-color-scheme: dark) { .input-row label { color: #e8e8e8; } }
input[type=number] { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 0.5px solid #AEAEB2; border-radius: 7px; background: #fff; color: #1D1D1F; width: 80px; }
@media (prefers-color-scheme: dark) { input[type=number] { background: #1e1e1e; border-color: #444; color: #e8e8e8; } }
.score-range { font-size: 11px; color: #8E8E93; margin-left: 4px; }
.msoi-result { border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; text-align: center; background: #E6F1FB; }
@media (prefers-color-scheme: dark) { .msoi-result { background: #0a1f3a; } }
.msoi-label { font-size: 12px; color: #185FA5; margin-bottom: 4px; font-weight: 600; }
.msoi-score { font-size: 48px; font-weight: 500; color: #0C447C; font-variant-numeric: tabular-nums; }
@media (prefers-color-scheme: dark) { .msoi-score { color: #85B7EB; } }
.msoi-tier { font-size: 14px; font-weight: 600; margin-top: 4px; }
.msoi-breakdown { font-size: 12px; color: #185FA5; margin-top: 6px; font-family: "SFMono-Regular", Menlo, monospace; }
@media (prefers-color-scheme: dark) { .msoi-breakdown { color: #B5D4F4; } }
/* Maturity tiers */
.tier-card { border-radius: 12px; padding: 14px 18px; margin-bottom: 6px; cursor: pointer; transition: opacity .12s; }
.tier-card:hover { opacity: .93; }
.tier-header { display: flex; align-items: center; gap: 12px; }
.tier-range { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 60px; }
.tier-name { font-size: 14px; font-weight: 600; flex: 1; }
.tier-def { font-size: 12px; margin-top: 8px; line-height: 1.55; display: none; }
.tier-def.show { display: block; }
.t-intel { background: #E1F5EE; } .t-intel .tier-range { color: #085041; } .t-intel .tier-name { color: #085041; } .t-intel .tier-def { color: #0F6E56; }
.t-opt { background: #E6F1FB; } .t-opt .tier-range { color: #0C447C; } .t-opt .tier-name { color: #0C447C; } .t-opt .tier-def { color: #185FA5; }
.t-struct { background: #FAEEDA; } .t-struct .tier-range { color: #633806; } .t-struct .tier-name { color: #633806; } .t-struct .tier-def { color: #854F0B; }
.t-react { background: #FAECE7; } .t-react .tier-range { color: #712B13; } .t-react .tier-name { color: #712B13; } .t-react .tier-def { color: #993C1D; }
.t-crit { background: #FCEBEB; } .t-crit .tier-range { color: #791F1F; } .t-crit .tier-name { color: #791F1F; } .t-crit .tier-def { color: #A32D2D; }
@media (prefers-color-scheme: dark) {
  .t-intel{background:#052e1e}.t-intel .tier-range{color:#9FE1CB}.t-intel .tier-name{color:#9FE1CB}.t-intel .tier-def{color:#5DCAA5}
  .t-opt{background:#0a1f3a}.t-opt .tier-range{color:#B5D4F4}.t-opt .tier-name{color:#B5D4F4}.t-opt .tier-def{color:#85B7EB}
  .t-struct{background:#2a1a00}.t-struct .tier-range{color:#FAC775}.t-struct .tier-name{color:#FAC775}.t-struct .tier-def{color:#EF9F27}
  .t-react{background:#2a1208}.t-react .tier-range{color:#F5C4B3}.t-react .tier-name{color:#F5C4B3}.t-react .tier-def{color:#F0997B}
  .t-crit{background:#2a0a0a}.t-crit .tier-range{color:#F7C1C1}.t-crit .tier-name{color:#F7C1C1}.t-crit .tier-def{color:#F09595}
}
.controls { display: flex; gap: 8px; margin-top: 4px; }
button.secondary { font-family: inherit; font-size: 14px; font-weight: 500; padding: 9px 22px; border-radius: 9px; border: 0.5px solid #AEAEB2; background: #fff; color: #1D1D1F; cursor: pointer; }
@media (prefers-color-scheme: dark) { button.secondary { background: #1e1e1e; border-color: #444; color: #e8e8e8; } }
</style>
</head>
<body>
<div class="meta">GroovConnect OAS™ · Module 10, Section 2 · Calculator & Reference</div>
<h1>MSOI Calculator — five components</h1>
<p class="sub">Enter values for each component. Formula is shown. All five must be recitable without reference.</p>

<div class="view-tabs">
  <button class="tab act-calc" id="tab-calc" onclick="switchView('calc')">MSOI Calculator</button>
  <button class="tab" id="tab-tiers" onclick="switchView('tiers')">Maturity Tiers</button>
</div>

<!-- CALCULATOR -->
<div class="panel active" id="panel-calc">
  <div class="formula-strip">
    <span class="fs-item">MI + EI + RI + SEI + CI = MSOI (0–100)</span>
    <span class="fs-item">Max 20 per component</span>
  </div>

  <div class="msoi-result">
    <div class="msoi-label">MSOI Score</div>
    <div class="msoi-score" id="msoi-total">—</div>
    <div class="msoi-tier" id="msoi-tier"></div>
    <div class="msoi-breakdown" id="msoi-breakdown"></div>
  </div>

  <div id="components"></div>
  <div class="controls"><button class="secondary" onclick="resetAll()">Reset</button></div>
</div>

<!-- TIERS -->
<div class="panel" id="panel-tiers">
  <div id="tiers"></div>
</div>

<script>
const COMPS = [
  { id:'mi', badge:'MI', name:'Matching Index', formula:'Avg DISC compatibility score across all active pairs ÷ 5', max:20,
    inputs:[{id:'mi_avg',label:'Avg DISC compatibility score (0–100)',min:0,max:100,def:72}] },
  { id:'ei', badge:'EI', name:'Engagement Index', formula:'(Lesson note submission % × Attendance %) × 20', max:20,
    inputs:[{id:'ei_notes',label:'Lesson note submission %',min:0,max:100,def:78},{id:'ei_att',label:'Attendance %',min:0,max:100,def:85}] },
  { id:'ri', badge:'RI', name:'Retention Index', formula:'(School retention % ÷ Network avg %) × 20, capped at 20', max:20,
    inputs:[{id:'ri_school',label:'School retention %',min:0,max:100,def:74},{id:'ri_network',label:'Network avg retention %',min:0,max:100,def:85}] },
  { id:'sei', badge:'SEI', name:'Scheduling Efficiency', formula:'(Delivered ÷ Scheduled) × Utilization % × 20', max:20,
    inputs:[{id:'sei_del',label:'Lessons delivered per week',min:0,max:500,def:162},{id:'sei_sch',label:'Lessons scheduled per week',min:1,max:500,def:200},{id:'sei_util',label:'Prime-time slot fill %',min:0,max:100,def:68}] },
  { id:'ci', badge:'CI', name:'Communication Index', formula:'(Parent portal login % × 24h follow-up %) × 20', max:20,
    inputs:[{id:'ci_portal',label:'Parent portal login %',min:0,max:100,def:42},{id:'ci_followup',label:'24-hour follow-up completion %',min:0,max:100,def:64}] },
];

const TIERS = [
  { cls:'t-intel', range:'85–100', name:'Intelligent', def:'Systems improve themselves through data feedback loops. Each interaction produces better predictions for the next cycle.' },
  { cls:'t-opt', range:'70–84', name:'Optimized', def:'Continuously improving existing systems. Human-driven improvement cycles are well-established and consistent.' },
  { cls:'t-struct', range:'50–69', name:'Structured', def:'Executing defined systems consistently. Processes are documented and followed but not yet self-improving.' },
  { cls:'t-react', range:'30–49', name:'Reactive', def:'Fixing problems as they occur. Systems exist but are inconsistently followed and require constant intervention.' },
  { cls:'t-crit', range:'< 30', name:'Critical', def:'No reliable operational systems. Every KPI movement requires emergency response rather than structured diagnosis.' },
];

function getScore(comp) {
  if (comp.id === 'mi') {
    const v = parseFloat(document.getElementById('mi_avg').value) || 0;
    return Math.min(20, Math.round(v / 5 * 10) / 10);
  }
  if (comp.id === 'ei') {
    const n = (parseFloat(document.getElementById('ei_notes').value) || 0) / 100;
    const a = (parseFloat(document.getElementById('ei_att').value) || 0) / 100;
    return Math.min(20, Math.round(n * a * 20 * 10) / 10);
  }
  if (comp.id === 'ri') {
    const s = (parseFloat(document.getElementById('ri_school').value) || 0);
    const n = (parseFloat(document.getElementById('ri_network').value) || 1);
    return Math.min(20, Math.round(s / n * 20 * 10) / 10);
  }
  if (comp.id === 'sei') {
    const del = parseFloat(document.getElementById('sei_del').value) || 0;
    const sch = parseFloat(document.getElementById('sei_sch').value) || 1;
    const util = (parseFloat(document.getElementById('sei_util').value) || 0) / 100;
    return Math.min(20, Math.round(del / sch * util * 20 * 10) / 10);
  }
  if (comp.id === 'ci') {
    const p = (parseFloat(document.getElementById('ci_portal').value) || 0) / 100;
    const f = (parseFloat(document.getElementById('ci_followup').value) || 0) / 100;
    return Math.min(20, Math.round(p * f * 20 * 10) / 10);
  }
  return 0;
}

function getTier(score) {
  if (score >= 85) return { name: 'Intelligent', color: '#085041' };
  if (score >= 70) return { name: 'Optimized', color: '#0C447C' };
  if (score >= 50) return { name: 'Structured', color: '#633806' };
  if (score >= 30) return { name: 'Reactive', color: '#993C1D' };
  return { name: 'Critical', color: '#A32D2D' };
}

function calcAll() {
  const scores = COMPS.map(c => ({ id: c.id, badge: c.badge, score: getScore(c) }));
  const total = Math.round(scores.reduce((s, c) => s + c.score, 0) * 10) / 10;
  const tier = getTier(total);
  document.getElementById('msoi-total').textContent = total.toFixed(1);
  document.getElementById('msoi-tier').textContent = tier.name;
  document.getElementById('msoi-tier').style.color = tier.color;
  document.getElementById('msoi-breakdown').textContent = scores.map(s => `${s.badge}: ${s.score.toFixed(1)}`).join('  ·  ');
}

function renderComps() {
  const BADGE_COLORS = { mi:'#185FA5', ei:'#534AB7', ri:'#0F6E56', sei:'#BA7517', ci:'#993C1D' };
  document.getElementById('components').innerHTML = COMPS.map(c => `
    <div class="comp-card">
      <div class="comp-header">
        <span class="comp-badge" style="background:${BADGE_COLORS[c.id]};color:#fff">${c.badge}</span>
        <span class="comp-name">${c.name}</span>
        <span class="comp-score" style="color:${BADGE_COLORS[c.id]}" id="${c.id}-score">—</span>
        <span style="font-size:12px;color:#8E8E93">/20</span>
      </div>
      <div class="comp-formula">${c.formula}</div>
      ${c.inputs.map(inp => `<div class="input-row"><label>${inp.label}</label><input type="number" id="${inp.id}" value="${inp.def}" min="${inp.min}" max="${inp.max}" oninput="updateScore('${c.id}')"><span class="score-range">${inp.min}–${inp.max}</span></div>`).join('')}
    </div>`).join('');
  COMPS.forEach(c => updateScore(c.id));
}

function updateScore(id) {
  const comp = COMPS.find(c => c.id === id);
  const score = getScore(comp);
  document.getElementById(`${id}-score`).textContent = score.toFixed(1);
  calcAll();
}

function resetAll() {
  COMPS.forEach(c => c.inputs.forEach(inp => { document.getElementById(inp.id).value = inp.def; }));
  COMPS.forEach(c => updateScore(c.id));
}

const tierOpen = new Array(TIERS.length).fill(false);
function renderTiers() {
  document.getElementById('tiers').innerHTML = TIERS.map((t, i) => `
    <div class="tier-card ${t.cls}" onclick="toggleTier(${i})">
      <div class="tier-header">
        <span class="tier-range">${t.range}</span>
        <span class="tier-name">${t.name}</span>
      </div>
      <div class="tier-def${tierOpen[i]?' show':''}">${t.def}</div>
    </div>`).join('');
}
function toggleTier(i) { tierOpen[i] = !tierOpen[i]; renderTiers(); }

function switchView(v) {
  document.getElementById('panel-calc').classList.toggle('active', v==='calc');
  document.getElementById('panel-tiers').classList.toggle('active', v==='tiers');
  document.getElementById('tab-calc').className='tab'+(v==='calc'?' act-calc':'');
  document.getElementById('tab-tiers').className='tab'+(v==='tiers'?' act-tiers':'');
}

renderComps();
renderTiers();
</script>
</body>
</html>
