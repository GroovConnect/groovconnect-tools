<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Sequence — Whiteboard Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #1D1D1F;
    padding: 40px 32px;
    max-width: 800px;
    margin: 0 auto;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e8; }
    .divider { stroke: #444; }
    .note-text { fill: #9a9a9a; }
    .box-neutral rect { fill: #2a2a2a; stroke: #555; }
    .box-neutral text { fill: #e0e0e0; }
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #1D1D1F;
    margin-bottom: 4px;
  }
  @media (prefers-color-scheme: dark) { h1 { color: #e8e8e8; } }
  p.sub {
    font-size: 13px;
    color: #6E6E73;
    margin-bottom: 28px;
  }
  svg { width: 100%; height: auto; display: block; }
  .print-note {
    margin-top: 24px;
    font-size: 12px;
    color: #8E8E93;
    border-top: 0.5px solid #D1D1D6;
    padding-top: 12px;
  }
  @media print {
    body { padding: 20px; }
    .print-note { display: none; }
  }
</style>
</head>
<body>

<h1>7-Step Master Sequence</h1>
<p class="sub">GroovConnect Operations Analyst System™ &nbsp;·&nbsp; Module 01 Whiteboard Reference</p>

<svg viewBox="0 0 720 530" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── LEFT COLUMN: Steps 1–4 ── -->

<!-- Step 1: KPI Signal -->
<rect x="50" y="36" width="260" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="70" y="57" font-family="-apple-system,sans-serif" font-size="11" fill="#185FA5" font-weight="500">STEP 1</text>
<text x="180" y="70" font-family="-apple-system,sans-serif" font-size="15" fill="#0C447C" font-weight="600" text-anchor="middle">KPI Signal</text>

<!-- Step 2: System Identification -->
<rect x="50" y="118" width="260" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="70" y="139" font-family="-apple-system,sans-serif" font-size="11" fill="#185FA5" font-weight="500">STEP 2</text>
<text x="180" y="152" font-family="-apple-system,sans-serif" font-size="15" fill="#0C447C" font-weight="600" text-anchor="middle">System Identification</text>

<!-- Step 3: Failure Localization -->
<rect x="50" y="200" width="260" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="70" y="221" font-family="-apple-system,sans-serif" font-size="11" fill="#185FA5" font-weight="500">STEP 3</text>
<text x="180" y="234" font-family="-apple-system,sans-serif" font-size="15" fill="#0C447C" font-weight="600" text-anchor="middle">Failure Localization</text>

<!-- Step 4: Propagation Mapping -->
<rect x="50" y="282" width="260" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="70" y="303" font-family="-apple-system,sans-serif" font-size="11" fill="#185FA5" font-weight="500">STEP 4</text>
<text x="180" y="316" font-family="-apple-system,sans-serif" font-size="15" fill="#0C447C" font-weight="600" text-anchor="middle">Propagation Mapping</text>

<!-- Left column connectors -->
<line x1="180" y1="88" x2="180" y2="118" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
<line x1="180" y1="170" x2="180" y2="200" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
<line x1="180" y1="252" x2="180" y2="282" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<!-- ── BRIDGE: Step 4 → Step 5 ── -->
<line x1="310" y1="308" x2="388" y2="308" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr-amber)"/>
<text x="349" y="299" font-family="-apple-system,sans-serif" font-size="11" fill="#854F0B" text-anchor="middle">discovery</text>

<!-- ── RIGHT COLUMN: Steps 5–7 + Output ── -->

<!-- Step 5: Economic Impact — amber / discovery -->
<rect x="390" y="282" width="280" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
<text x="412" y="303" font-family="-apple-system,sans-serif" font-size="11" fill="#854F0B" font-weight="500">STEP 5</text>
<text x="530" y="314" font-family="-apple-system,sans-serif" font-size="15" fill="#633806" font-weight="700" text-anchor="middle">Economic Impact</text>
<rect x="614" y="287" width="50" height="18" rx="9" fill="#BA7517"/>
<text x="639" y="300" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">anchor</text>

<!-- Step 6: Priority Scoring -->
<rect x="390" y="200" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="412" y="221" font-family="-apple-system,sans-serif" font-size="11" fill="#0F6E56" font-weight="500">STEP 6</text>
<text x="530" y="234" font-family="-apple-system,sans-serif" font-size="15" fill="#085041" font-weight="600" text-anchor="middle">Priority Scoring</text>

<!-- Step 7: Capability Output -->
<rect x="390" y="118" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="412" y="139" font-family="-apple-system,sans-serif" font-size="11" fill="#0F6E56" font-weight="500">STEP 7</text>
<text x="530" y="152" font-family="-apple-system,sans-serif" font-size="15" fill="#085041" font-weight="600" text-anchor="middle">Capability Output</text>

<!-- Structural Recommendation output box -->
<rect x="390" y="36" width="280" height="52" rx="8" fill="#085041" stroke="#085041" stroke-width="0.8"/>
<text x="530" y="60" font-family="-apple-system,sans-serif" font-size="13" fill="#E1F5EE" font-weight="600" text-anchor="middle">Structural Recommendation</text>
<text x="530" y="78" font-family="-apple-system,sans-serif" font-size="11" fill="#9FE1CB" text-anchor="middle">Root cause → mechanism → outcome</text>

<!-- Right column connectors (upward) -->
<line x1="530" y1="282" x2="530" y2="252" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>
<line x1="530" y1="200" x2="530" y2="170" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>
<line x1="530" y1="118" x2="530" y2="88" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>

<!-- ── DIVIDER ── -->
<line x1="30" y1="372" x2="690" y2="372" stroke="#D1D1D6" stroke-width="0.5"/>

<!-- ── INSTRUCTOR NOTES ── -->
<text x="30" y="397" font-family="-apple-system,sans-serif" font-size="12" fill="#1D1D1F" font-weight="600">Whiteboard exercise</text>
<text x="30" y="415" font-family="-apple-system,sans-serif" font-size="12" fill="#3A3A3C">Draw all 7 steps with blank labels. Ask trainees to predict what comes after each step before revealing it.</text>
<text x="30" y="433" font-family="-apple-system,sans-serif" font-size="12" fill="#3A3A3C">The moment a trainee discovers "Economic Impact" at Step 5 becomes a memory anchor for the full sequence.</text>

<text x="30" y="460" font-family="-apple-system,sans-serif" font-size="12" fill="#1D1D1F" font-weight="600">5-minute sequencing drill</text>
<text x="30" y="478" font-family="-apple-system,sans-serif" font-size="12" fill="#3A3A3C">Present a scenario. Trainees call out the step number as they work through it. Do not correct content</text>
<text x="30" y="496" font-family="-apple-system,sans-serif" font-size="12" fill="#3A3A3C">errors — sequencing discipline is the only objective at this stage.</text>
</svg>

<p class="print-note">GroovConnect Operations Analyst System™ · Module 01 · Instructor Edition &nbsp;|&nbsp; Print at 100% for whiteboard reference</p>

</body>
</html>
